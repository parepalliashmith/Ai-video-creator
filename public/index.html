<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Free AI Video Creator</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="bg-glow"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-icon">🎬</span>
    <span>Free AI Video Creator</span>
  </div>
  <div class="brand-sub">Script → AI images → narration → captions, rendered to MP4. 100% free tier.</div>
</header>

<main class="wrap">
  <!-- ================= SCENE VIDEO ================= -->
  <section class="panel" id="panel-scene">
    <form id="scene-form" class="card">
      <label class="field">
        <span>Topic or script</span>
        <textarea id="topic" rows="3" placeholder="e.g. The history of coffee, in a fun and simple way" required></textarea>
      </label>

      <div class="row">
        <label class="field">
          <span>Scenes</span>
          <select id="sceneCount">
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5" selected>5</option>
            <option value="6">6</option>
            <option value="8">8</option>
          </select>
        </label>

        <label class="field">
          <span>Language</span>
          <select id="lang">
            <option value="en" selected>English</option>
            <option value="te">Telugu</option>
            <option value="hi">Hindi</option>
          </select>
        </label>
      </div>

      <div class="field">
        <span>Orientation</span>
        <div class="seg">
          <button type="button" class="seg-btn active" data-orientation="landscape">▭ Landscape 16:9</button>
          <button type="button" class="seg-btn" data-orientation="portrait">▯ Portrait 9:16</button>
        </div>
      </div>

      <div class="field">
        <span>Scene images</span>
        <div class="seg">
          <button type="button" class="seg-btn active" data-imgsrc="ai">✨ AI-generated</button>
          <button type="button" class="seg-btn" data-imgsrc="upload">📷 Upload my photos</button>
        </div>
      </div>

      <label class="field" id="upload-field" hidden>
        <span>Photos (used in order, one per scene)</span>
        <input type="file" id="images" accept="image/*" multiple />
      </label>

      <div class="row toggles">
        <label class="check"><input type="checkbox" id="captionsOn" checked /> Burned-in captions</label>
        <label class="check"><input type="checkbox" id="addMusic" /> Soft background music (generated, royalty-free)</label>
        <label class="check"><input type="checkbox" id="fastMode" /> Fast render (skip crossfades — hard cuts, much quicker on the free server)</label>
      </div>

      <button type="submit" class="primary" id="scene-submit">Create video</button>
      <p class="hint" id="scene-config-hint"></p>
    </form>

    <div class="card status-card" id="scene-status" hidden>
      <div class="spinner"></div>
      <div class="status-text" id="scene-status-text">Starting…</div>
      <div class="progress-bar"><div class="progress-fill" id="scene-progress-fill"></div></div>
    </div>

    <div class="card error-card" id="scene-error" hidden>
      <p id="scene-error-text"></p>
      <button class="secondary" id="scene-retry">Try again</button>
    </div>

    <div class="card result-card" id="scene-result" hidden>
      <h3 id="scene-result-title">Your video</h3>
      <video id="scene-video" controls playsinline></video>
      <div class="result-actions">
        <a class="primary" id="scene-download" download>Download MP4</a>
        <button class="secondary" id="scene-again">Create another</button>
      </div>
    </div>
  </section>
</main>

<footer class="foot">Built for zero cost — free Gemini script/image generation, free browser-grade narration, procedurally generated music. No account needed.</footer>

<script src="app.js"></script>
</body>
</html>
